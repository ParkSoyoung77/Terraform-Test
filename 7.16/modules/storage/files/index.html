<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>std17 Static Website</title>
<link rel="stylesheet" href="실습예제/default.css">
<style>
    body {
        margin: 0;
        font-family: -apple-system, "Malgun Gothic", sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .container {
        text-align: center;
        padding: 40px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
        font-size: 2.2rem;
        margin-bottom: 10px;
    }
    p {
        font-size: 1.1rem;
        opacity: 0.85;
        margin: 6px 0;
    }
    .badge {
        display: inline-block;
        margin-top: 20px;
        padding: 6px 16px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>std17-s3-bucket</h1>
        <p>AWS S3 정적 웹사이트 호스팅 테스트 페이지</p>
        <p>Terraform으로 배포됨</p>
        <div class="badge">Owner: std17 &nbsp;|&nbsp; Class: bipa17</div>
    </div>
</body>
</html>
